# Render Blueprint - deploys the web service AND its PostgreSQL database together.
#
# Usage: push this file to your repo's root, then in the Render Dashboard:
#   New -> Blueprint -> connect this repo -> Deploy Blueprint
# Render prompts you for the two `sync: false` values below (the bootstrap admin's
# email/password) during that flow - everything else is wired automatically,
# including a freshly generated JWT_SECRET. No manual variable copying, and no
# separate migrate/seed step: package.json's `start` script runs both (they're
# idempotent - see scripts/migrate.js and scripts/seed.js) before starting the server.
#
# This defaults to Render's free tier, which has one real limitation worth knowing:
# free web services have an ephemeral filesystem, so uploaded documents/photos
# (stored under uploads/) won't survive a redeploy. To fix that, upgrade the web
# service below to a paid plan (e.g. `starter`) and uncomment the `disk:` block.

databases:
  - name: school-management-db
    plan: free
    databaseName: school_management
    user: schoolapp

services:
  - type: web
    name: school-management-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGHOST
        fromDatabase:
          name: school-management-db
          property: host
      - key: PGPORT
        value: "5432"
      - key: PGDATABASE
        fromDatabase:
          name: school-management-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: school-management-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: school-management-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
    # Uncomment below (and change `plan` above to a paid tier, e.g. `starter`) once
    # you're ready for uploaded documents/photos to survive redeploys:
    # disk:
    #   name: uploads
    #   mountPath: /opt/render/project/src/uploads
    #   sizeGB: 1
    # envVars: (add this one alongside the others above if you enable the disk)
    #   - key: UPLOADS_DIR
    #     value: /opt/render/project/src/uploads
